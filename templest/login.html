<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Login | Admin Panel</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #4361ee;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body {
            font-family: 'Inter', sans-serif;
            /* background: var(--bg-gradient); */
            background-image:url(https://thumbs.dreamstime.com/b/displayed-blue-background-low-polygon-cctv-camera-wireframe-mesh-displayed-blue-background-low-polygon-cctv-383432560.jpg) ;
            background-repeat: no-repeat;
            background-size: cover;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            overflow: hidden;
            width: 100%;
            max-width: 400px;
            transition: transform 0.3s ease;
        }

        .login-header {
            background: #fff;
            padding: 40px 30px 20px;
            text-align: center;
        }

        .login-header h2 {
            font-weight: 700;
            color: #2d3436;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .login-header p {
            color: #636e72;
            font-size: 0.9rem;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 2px solid #f1f2f6;
            transition: all 0.3s;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: none;
            background: #fff;
        }

        .btn-login {
            background: var(--primary-color);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
            width: 100%;
            color: white;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: #3046c9;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(67, 97, 238, 0.3);
        }

        .error-msg {
            background: #fff5f5;
            color: #e74c3c;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            border-left: 4px solid #e74c3c;
            display: flex;
            align-items: center;
        }

        .input-group-text {
            background: transparent;
            border: 2px solid #f1f2f6;
            border-right: none;
            color: #b2bec3;
        }

        .form-control {
            border-left: none;
        }
    </style>
</head>
<body>

    <div class="login-card p-4">
        <div class="login-header">
            <div class="mb-3">
                <!-- <i class="fas fa-shield-halved fa-3x" style="color: var(--primary-color);"></i> -->
                 <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTCIybSPQO_VmBg5cDkS-dHmq7o3_5ql4kJSA&s" height="70px" width="120px">
            </div>
            <h2>Welcome CctvCameraProject</h2>
            <p>Please enter your credentials use to my site</p>
        </div>

        {% if error %}
        <div class="error-msg">
            <i class="fas fa-circle-exclamation me-2"></i> {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            
            <div class="mb-4">
                <label class="form-label small fw-bold">EMAIL YOUR</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="email" name="email" class="form-control" placeholder="Enter Email" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label small fw-bold">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                </div>
            </div>

            <button type="submit" class="btn btn-login">
                Sign In <i class="fas fa-arrow-right ms-2"></i>
            </button>
            
            <div class="text-center mt-4">
                <a href="#" class="text-decoration-none small text-muted">Forgot password?</a>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
